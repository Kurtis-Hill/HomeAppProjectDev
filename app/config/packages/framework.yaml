framework:
    secret: '%env(APP_SECRET)%'
    http_method_override: false
    # Trust the reverse proxy so Symfony builds correct URLs when behind /HomeApp/.
    # TRUSTED_PROXIES can be set to the IP/CIDR of your nginx proxy in .env.
    # Use "127.0.0.1,REMOTE_ADDR" for a local proxy, or a specific IP/CIDR.
    trusted_proxies: '%env(TRUSTED_PROXIES)%'
    trusted_headers:
        - x-forwarded-for
        - x-forwarded-host
        - x-forwarded-proto
        - x-forwarded-port
        - x-forwarded-prefix
    csrf_protection: true
    http_client:
      max_host_connections: '%env(int:HTTP_MAX_CONNECTIONS)%'
      scoped_clients:
        elastica.client:
          base_uri: '%env(ELASTIC_TRANSPORT)%://%env(ELASTIC_SEARCH_HOST)%:%env(ELASTIC_SEARCH_PORT)%'
          auth_basic: "%env(string:ELASTIC_SEARCH_HTTP_AUTH_USERNAME)%:%env(string:ELASTIC_SEARCH_HTTP_AUTH_PASSWORD)%"
          verify_host: false
          verify_peer: false
        slack.hooks.client:
          base_uri: 'https://hooks.slack.com'
          headers: { 'Content-Type': 'application/json' }


    #http_method_override: true
    # Enables session support. Note that the session will ONLY be started if you read or write from it.
    # Remove or comment this section to explicitly disable session support.
    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
