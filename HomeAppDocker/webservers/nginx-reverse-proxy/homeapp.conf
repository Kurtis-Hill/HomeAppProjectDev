server {
    listen 80;
    listen [::]:80;
    server_name klh19901017.asuscomm.com;

    location / {
        proxy_pass        http://192.168.1.13:8562;
        proxy_set_header  X-Real-IP  $remote_addr;
        proxy_set_header  Host            $host;
        proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;

        access_log /var/log/nginx/MarkHill.log;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name klh19901017.asuscomm.com;

    location = /robots.txt {
        return 200 "User-agent: *\nDisallow: /\n";
        add_header Content-Type text/plain;
    }

    location /motioneye/ {
        proxy_pass http://192.168.1.10:8765/;
        proxy_read_timeout 120s;
        access_log off;
    }

    location /camera1/ {
        proxy_pass http://localhost:8081/;
        proxy_read_timeout 120s;
        access_log off;
    }

    location /mjpeg {
        proxy_pass http://localhost:8080/;
        proxy_read_timeout 86400;
    }

    # -------------------------------------------------------------------
    # HomeApp — Symfony app behind /HomeApp/ sub-path prefix
    #
    # Routes are already prefixed with /HomeApp/ inside Symfony, so nginx
    # must pass the full path through unchanged (no URI on proxy_pass).
    # X-Forwarded-Prefix is NOT set — the prefix is already in the routes,
    # adding it would make Symfony double it up (/HomeApp/HomeApp/...).
    # X-Forwarded-Host + X-Forwarded-Proto let Symfony generate correct
    # absolute redirect URLs (e.g. after login).
    # -------------------------------------------------------------------
    location /HomeApp/ {
        proxy_pass        http://192.168.1.10:8107;   # no trailing URI = full path passed through

        proxy_set_header  Host                $host;
        proxy_set_header  X-Real-IP           $remote_addr;
        proxy_set_header  X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto   $scheme;
        proxy_set_header  X-Forwarded-Host    $host;
        proxy_set_header  X-Forwarded-Port    $server_port;

        proxy_redirect    off;

        proxy_buffering off;
        access_log /var/log/nginx/Homeapp.log;
    }

    location /sonarr {
        proxy_pass        http://192.168.1.13:8989;
        proxy_set_header  X-Real-IP  $remote_addr;
        proxy_set_header  Host            $host;
        proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;
        proxy_connect_timeout       240;
        proxy_send_timeout          240;
        proxy_read_timeout          240;
        send_timeout                240;
        access_log /var/log/nginx/sonarr.you-domain.xyz.log;
    }

    location /radarr {
        proxy_pass        http://192.168.1.13:7878;
        proxy_set_header  X-Real-IP  $remote_addr;
        proxy_set_header  Host            $host;
        proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;
        proxy_connect_timeout       240;
        proxy_send_timeout          240;
        proxy_read_timeout          240;
        send_timeout                240;
        access_log /var/log/nginx/radarr.you-domain.xyz.log;
    }

    location /bazarr {
        proxy_pass        http://192.168.1.13:6767;
        proxy_set_header  X-Real-IP  $remote_addr;
        proxy_set_header  Host            $host;
        proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;
        proxy_connect_timeout       240;
        proxy_send_timeout          240;
        proxy_read_timeout          240;
        send_timeout                240;
        access_log /var/log/nginx/radarr.you-domain.xyz.log;
    }

    location /lidarr {
        proxy_pass        http://192.168.1.13:8686;
        proxy_set_header  X-Real-IP  $remote_addr;
        proxy_set_header  Host            $host;
        proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;
        proxy_connect_timeout       240;
        proxy_send_timeout          240;
        proxy_read_timeout          240;
        send_timeout                240;
        access_log /var/log/nginx/lidarr.klh19901017.asuscomm.com.log;
    }

    location /deluge {
        proxy_pass        http://192.168.1.13:8112/;
        proxy_set_header X-Deluge-Base "/deluge/";
        add_header X-Frame-Options SAMEORIGIN;
        access_log /var/log/nginx/radarr.you-domain.xyz.log;
    }

    location /plex-stats/ {
        proxy_pass              http://192.168.1.10:8181/plex-stats/;
        proxy_http_version      1.1;
        proxy_set_header        X-Forwarded-Host        $http_host;
        proxy_redirect http://192.168.1.11:8181 https://$host;
        add_header X-Frame-Options "SAMEORIGIN";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Ssl on;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    ssl_certificate /etc/letsencrypt/live/klh19901017.asuscomm.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/klh19901017.asuscomm.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
